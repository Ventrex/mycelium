services:
  mycelium:
    build: .
    image: ghcr.io/ventrex/mycelium:latest
    container_name: mycelium
    restart: unless-stopped
    ports:
      - "8088:8088"
      - "8089:8089"
    env_file:
      - .env
    environment:
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8088
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "937"
    volumes:
      - ./data:/data
      - ./static/jellyfin-splash.png:/app/static/jellyfin-splash.png:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8088/health',timeout=5); sys.exit(0 if r.status==200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./apps/jellyfin:/config
      - ./data/media/movies:/mnt/venflix/movies:rw
      - ./data/media/series:/mnt/venflix/series:rw
      - ./data/media:/mnt/media:rw
    ports:
      - "8096:8096"
      - "7359:7359/udp"
      - "1900:1900/udp"

  # Self-hosted hash index (DebridMediaManager-style), tried before Torrentio
  # when ZILEAN_ENABLED=true. Set ZILEAN_URL=http://zilean:8181 in .env to use
  # this bundled instance instead of an external one. Behind a profile so it
  # doesn't start (and use RAM) unless you opt in:
  #   docker compose --profile zilean up -d
  zilean:
    image: ipromknight/zilean:latest
    container_name: mycelium-zilean
    restart: unless-stopped
    profiles:
      - zilean
    depends_on:
      zilean-postgres:
        condition: service_healthy
    environment:
      - Zilean__Database__ConnectionString=Host=zilean-postgres;Port=5432;Database=zilean;Username=postgres;Password=postgres
      # Imports the DMM hash list in smaller batches instead of all at once.
      # Plain import can spike RAM to 6-7GB for about an hour; keep this on
      # for NAS-class hardware.
      - Zilean__Dmm__ImportBatched=true
    volumes:
      - zilean_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "--connect-timeout", "10", "--silent", "--show-error", "--fail", "http://127.0.0.1:8181/healthchecks/ping"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s

  zilean-postgres:
    image: postgres:16.3-alpine3.20
    container_name: mycelium-zilean-postgres
    restart: unless-stopped
    profiles:
      - zilean
    environment:
      - PGDATA=/var/lib/postgresql/data/pgdata
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=zilean
    volumes:
      - zilean_pgdata:/var/lib/postgresql/data/pgdata
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  zilean_data:
  zilean_pgdata:
