services:
  mycelium:
    build: .
    image: ghcr.io/ventrex/mycelium:latest
    container_name: mycelium
    restart: unless-stopped
    ports:
      - "8088:8088"
      - "8089:8089"
    env_file:
      - .env
    environment:
      - LISTEN_HOST=0.0.0.0
      - LISTEN_PORT=8088
    devices:
      - /dev/dri:/dev/dri
    group_add:
      - "937"
    volumes:
      - ./data:/data
      - ./static/jellyfin-splash.png:/app/static/jellyfin-splash.png:ro
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request,sys; r=urllib.request.urlopen('http://127.0.0.1:8088/health',timeout=5); sys.exit(0 if r.status==200 else 1)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  jellyfin:
    image: lscr.io/linuxserver/jellyfin:latest
    container_name: jellyfin
    restart: unless-stopped
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Amsterdam
    volumes:
      - ./apps/jellyfin:/config
      - ./data/media/movies:/mnt/venflix/movies:rw
      - ./data/media/series:/mnt/venflix/series:rw
      - ./data/media:/mnt/media:rw
    ports:
      - "8096:8096"
      - "7359:7359/udp"
      - "1900:1900/udp"
