name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ steps.meta.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
            docker.io/corveck/mycelium:${{ steps.meta.outputs.version }}
            docker.io/corveck/mycelium:latest
          build-args: |
            BUILD_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract release notes
        run: |
          python3 << 'PYEOF'
          import re, os
          version = os.environ['VERSION']
          repo = os.environ['REPO']
          with open('CHANGELOG.md') as f:
              content = f.read()
          pattern = rf'## \[{re.escape(version)}\][^\n]*\n(.*?)(?=\n## \[|\Z)'
          m = re.search(pattern, content, re.DOTALL)
          notes = m.group(1).strip() if m else f'_See [CHANGELOG.md](https://github.com/{repo}/blob/main/CHANGELOG.md) for full details._'
          body = (
              f'## Install\n\n'
              f'```bash\n'
              f'docker pull ghcr.io/{repo}:{version}\n'
              f'```\n\n'
              f'---\n\n'
              f'{notes}\n'
          )
          with open('release_notes.md', 'w') as f:
              f.write(body)
          PYEOF
        env:
          VERSION: ${{ steps.meta.outputs.version }}
          REPO: ${{ github.repository }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: false
          body_path: release_notes.md
